<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="540" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">THE FULL WORKFLOW</text>

  <!-- Step 1: Idea -->
  <rect x="40" y="60" width="120" height="48" rx="24" fill="#1c1917"/>
  <text x="100" y="88" text-anchor="middle" font-size="12" font-weight="500" fill="white">You have an idea</text>

  <!-- Arrow -->
  <line x1="160" y1="84" x2="190" y2="84" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="186,79 196,84 186,89" fill="#d6d3d1"/>

  <!-- Step 2: Black Box -->
  <rect x="196" y="60" width="160" height="48" rx="6" fill="#1c1917"/>
  <text x="276" y="80" text-anchor="middle" font-size="10" font-family="'SF Mono', 'Fira Code', monospace" fill="#6ee7b7">$ describe intent</text>
  <text x="276" y="96" text-anchor="middle" font-size="9" fill="#a8a29e">Black Box Terminal</text>

  <!-- Arrow down from black box -->
  <line x1="276" y1="108" x2="276" y2="140" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="271,136 276,146 281,136" fill="#d6d3d1"/>

  <!-- Step 3: Agents spawn -->
  <text x="276" y="164" text-anchor="middle" font-size="11" font-weight="500" fill="#1c1917">Agents spawn</text>

  <!-- Fan out lines -->
  <line x1="276" y1="172" x2="120" y2="210" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="276" y1="172" x2="240" y2="210" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="276" y1="172" x2="380" y2="210" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="276" y1="172" x2="520" y2="210" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Agent boxes -->
  <rect x="70" y="210" width="100" height="40" rx="4" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="86" cy="230" r="4" fill="#22c55e"/>
  <text x="96" y="234" font-size="10" fill="#44403c">Research</text>

  <rect x="190" y="210" width="100" height="40" rx="4" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="206" cy="230" r="4" fill="#22c55e"/>
  <text x="216" y="234" font-size="10" fill="#44403c">Writing</text>

  <rect x="330" y="210" width="100" height="40" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <circle cx="346" cy="230" r="4" fill="#ef4444"/>
  <text x="356" y="234" font-size="10" fill="#ef4444">Design</text>

  <rect x="470" y="210" width="100" height="40" rx="4" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="486" cy="230" r="4" fill="#22c55e"/>
  <text x="496" y="234" font-size="10" fill="#44403c">Build</text>

  <!-- Converge lines to Map -->
  <line x1="120" y1="250" x2="260" y2="290" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="240" y1="250" x2="290" y2="290" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="380" y1="250" x2="340" y2="290" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="520" y1="250" x2="380" y2="290" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Step 4: Map Layer -->
  <rect x="200" y="290" width="240" height="60" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="320" y="312" text-anchor="middle" font-size="11" font-weight="500" fill="#1c1917">The Map</text>
  <text x="320" y="328" text-anchor="middle" font-size="10" fill="#a8a29e">Visual progress from your perspective</text>
  <!-- Mini nodes -->
  <circle cx="240" cy="334" r="3" fill="#d6d3d1"/>
  <circle cx="280" cy="330" r="3" fill="#d6d3d1"/>
  <circle cx="330" cy="336" r="3" fill="#d6d3d1"/>
  <circle cx="370" cy="330" r="3" fill="#d6d3d1"/>
  <circle cx="410" cy="334" r="3" fill="#d6d3d1"/>
  <line x1="243" y1="334" x2="277" y2="330" stroke="#e7e5e4" stroke-width="0.5"/>
  <line x1="283" y1="330" x2="327" y2="336" stroke="#e7e5e4" stroke-width="0.5"/>
  <line x1="333" y1="336" x2="367" y2="330" stroke="#e7e5e4" stroke-width="0.5"/>
  <line x1="373" y1="330" x2="407" y2="334" stroke="#e7e5e4" stroke-width="0.5"/>

  <!-- Arrow to Manager -->
  <line x1="320" y1="350" x2="320" y2="380" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="315,376 320,386 325,376" fill="#d6d3d1"/>

  <!-- Step 5: Manager Layer -->
  <rect x="200" y="386" width="240" height="46" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="320" y="406" text-anchor="middle" font-size="11" font-weight="500" fill="#1c1917">The Manager</text>
  <text x="320" y="420" text-anchor="middle" font-size="10" fill="#a8a29e">Status board. Green or red. Ping on need.</text>

  <!-- Context injection feedback arrow (RED agent pings you) -->
  <!-- Curved arrow from Design agent to YOU label -->
  <rect x="490" y="270" width="140" height="80" rx="6" fill="white" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="560" y="294" text-anchor="middle" font-size="10" font-weight="500" fill="#ef4444">Context injection</text>
  <text x="560" y="312" text-anchor="middle" font-size="9" fill="#44403c">Agent pings you.</text>
  <text x="560" y="326" text-anchor="middle" font-size="9" fill="#44403c">You provide direction.</text>
  <text x="560" y="340" text-anchor="middle" font-size="9" fill="#44403c">It resumes driving.</text>

  <!-- Arrow from red agent to context box -->
  <line x1="430" y1="240" x2="490" y2="280" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Arrow from context box back to agent flow -->
  <line x1="490" y1="330" x2="440" y2="330" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="444,326 434,330 444,334" fill="#fca5a5"/>

  <!-- Arrow to Output -->
  <line x1="320" y1="432" x2="320" y2="460" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="315,456 320,466 325,456" fill="#d6d3d1"/>

  <!-- Step 6: Output -->
  <rect x="240" y="468" width="160" height="48" rx="24" fill="#1c1917"/>
  <text x="320" y="490" text-anchor="middle" font-size="12" font-weight="500" fill="white">Shipped product</text>
  <text x="320" y="506" text-anchor="middle" font-size="9" fill="#a8a29e">100x output. One person.</text>
</svg>

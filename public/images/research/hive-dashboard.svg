<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="680" height="480" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">HIVE</text>

  <rect x="40" y="56" width="600" height="400" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>

  <rect x="40" y="56" width="220" height="400" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>
  <rect x="260" y="56" width="1" height="400" fill="#e7e5e4"/>

  <text x="60" y="84" font-size="14" font-weight="600" fill="#1c1917">All Agents</text>
  <text x="60" y="100" font-size="10" fill="#a8a29e">6 online, 2 offline slots</text>

  <rect x="50" y="118" width="200" height="36" rx="6" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="136" r="5" fill="#22c55e"/>
  <text x="80" y="132" font-size="10.5" font-weight="600" fill="#1c1917">Q1 Research</text>
  <text x="80" y="145" font-size="9.5" fill="#a8a29e">working on source gathering</text>

  <rect x="50" y="162" width="200" height="36" rx="6" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="180" r="5" fill="#22c55e"/>
  <text x="80" y="176" font-size="10.5" font-weight="600" fill="#1c1917">Q2 Writer</text>
  <text x="80" y="189" font-size="9.5" fill="#a8a29e">drafting the next section</text>

  <rect x="50" y="206" width="200" height="36" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <circle cx="68" cy="224" r="5" fill="#eab308"/>
  <text x="80" y="220" font-size="10.5" font-weight="600" fill="#1c1917">Q3 Deploy</text>
  <text x="80" y="233" font-size="9.5" fill="#a16207">needs a routing decision</text>

  <rect x="50" y="250" width="200" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <circle cx="68" cy="268" r="5" fill="#ef4444"/>
  <text x="80" y="264" font-size="10.5" font-weight="600" fill="#1c1917">Q4 Builder</text>
  <text x="80" y="277" font-size="9.5" fill="#ef4444">finished and waiting</text>

  <rect x="50" y="294" width="200" height="36" rx="6" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="312" r="5" fill="#22c55e"/>
  <text x="80" y="308" font-size="10.5" font-weight="600" fill="#1c1917">Q5 QA</text>
  <text x="80" y="321" font-size="9.5" fill="#a8a29e">running checks on the build</text>

  <rect x="50" y="338" width="200" height="36" rx="6" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="356" r="5" fill="#22c55e"/>
  <text x="80" y="352" font-size="10.5" font-weight="600" fill="#1c1917">Q6 Ops</text>
  <text x="80" y="365" font-size="9.5" fill="#a8a29e">syncing deploy notes</text>

  <rect x="50" y="390" width="200" height="52" rx="10" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="64" y="410" font-size="9.5" font-weight="600" fill="#1c1917">Why the layout works</text>
  <text x="64" y="425" font-size="8.5" fill="#78716c">Every agent is a full-width strip.</text>
  <text x="64" y="437" font-size="8.5" fill="#78716c">New agents slot in below the stack.</text>

  <text x="280" y="84" font-size="12" font-weight="500" fill="#1c1917">Hosted dashboard</text>
  <text x="510" y="84" font-size="10" fill="#a8a29e">1 column, 1-8 rows</text>
  <circle cx="596" cy="80" r="3" fill="#22c55e"/>

  <text x="280" y="106" font-size="9" fill="#78716c">Top of your screen</text>

  <rect x="280" y="118" width="340" height="302" rx="14" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>

  <rect x="294" y="134" width="312" height="30" rx="10" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="312" cy="149" r="5" fill="#22c55e"/>
  <text x="326" y="145" font-size="10.5" font-weight="600" fill="#166534">Q1  Research agent</text>
  <text x="326" y="157" font-size="8.5" fill="#166534">finding references and notes</text>

  <rect x="294" y="170" width="312" height="30" rx="10" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="312" cy="185" r="5" fill="#22c55e"/>
  <text x="326" y="181" font-size="10.5" font-weight="600" fill="#166534">Q2  Writing agent</text>
  <text x="326" y="193" font-size="8.5" fill="#166534">drafting copy for the next pass</text>

  <rect x="294" y="206" width="312" height="30" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <circle cx="312" cy="221" r="5" fill="#eab308"/>
  <text x="326" y="217" font-size="10.5" font-weight="600" fill="#92400e">Q3  Deploy debugger</text>
  <text x="326" y="229" font-size="8.5" fill="#92400e">waiting on a decision from you</text>

  <rect x="294" y="242" width="312" height="30" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <circle cx="312" cy="257" r="5" fill="#ef4444"/>
  <text x="326" y="253" font-size="10.5" font-weight="600" fill="#991b1b">Q4  Builder</text>
  <text x="326" y="265" font-size="8.5" fill="#991b1b">stopped after finishing its task</text>

  <rect x="294" y="278" width="312" height="30" rx="10" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="312" cy="293" r="5" fill="#22c55e"/>
  <text x="326" y="289" font-size="10.5" font-weight="600" fill="#44403c">Q5  QA</text>
  <text x="326" y="301" font-size="8.5" fill="#78716c">running verification on the latest build</text>

  <rect x="294" y="314" width="312" height="30" rx="10" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="312" cy="329" r="5" fill="#22c55e"/>
  <text x="326" y="325" font-size="10.5" font-weight="600" fill="#44403c">Q6  Ops</text>
  <text x="326" y="337" font-size="8.5" fill="#78716c">syncing artifacts and deploy notes</text>

  <rect x="294" y="350" width="312" height="30" rx="10" fill="none" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="4 4"/>
  <circle cx="312" cy="365" r="5" fill="#d6d3d1"/>
  <text x="326" y="361" font-size="10.5" font-weight="600" fill="#78716c">Q7  Offline</text>
  <text x="326" y="373" font-size="8.5" fill="#a8a29e">ready for the next agent</text>

  <rect x="294" y="386" width="312" height="20" rx="10" fill="none" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="450" y="399" text-anchor="middle" font-size="8.5" fill="#a8a29e">Q8 offline slot</text>

  <text x="280" y="438" font-size="9" fill="#78716c">Bottom of your screen. The stack always stays vertical. The top agent stays on top.</text>
</svg>

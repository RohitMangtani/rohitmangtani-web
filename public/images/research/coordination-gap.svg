<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="440" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">THE COORDINATION GAP</text>

  <!-- Central AI Team (left) -->
  <rect x="40" y="70" width="200" height="140" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="140" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">Central AI Team</text>
  <text x="60" y="118" font-size="10" fill="#44403c">Tools &amp; Models</text>
  <text x="60" y="136" font-size="10" fill="#44403c">Infrastructure</text>
  <text x="60" y="154" font-size="10" fill="#44403c">Safety &amp; Containment</text>
  <text x="60" y="172" font-size="10" fill="#44403c">Documentation</text>
  <text x="60" y="196" font-size="9" fill="#a8a29e">Builds capability</text>

  <!-- User Groups (right) -->
  <rect x="440" y="70" width="200" height="140" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="540" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">User Groups</text>

  <!-- Progressive -->
  <rect x="455" y="108" width="170" height="26" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="540" y="125" text-anchor="middle" font-size="9" fill="#166534">Progressive: motivated, variable skill</text>

  <!-- Passive -->
  <rect x="455" y="140" width="170" height="26" rx="4" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="540" y="157" text-anchor="middle" font-size="9" fill="#854d0e">Passive: low urgency, high friction</text>

  <!-- Regressive -->
  <rect x="455" y="172" width="170" height="26" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="540" y="189" text-anchor="middle" font-size="9" fill="#991b1b">Regressive: fear displacement</text>

  <!-- Gap area -->
  <rect x="255" y="80" width="170" height="120" rx="6" fill="none" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="340" y="128" text-anchor="middle" font-size="11" font-weight="500" fill="#a8a29e">COORDINATION</text>
  <text x="340" y="146" text-anchor="middle" font-size="11" font-weight="500" fill="#a8a29e">GAP</text>
  <text x="340" y="176" text-anchor="middle" font-size="9" fill="#d6d3d1">Neither side can</text>
  <text x="340" y="190" text-anchor="middle" font-size="9" fill="#d6d3d1">cross independently</text>

  <!-- Arrows to gap -->
  <line x1="240" y1="140" x2="255" y2="140" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="251,134 261,140 251,146" fill="#d6d3d1"/>

  <line x1="440" y1="140" x2="425" y2="140" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="429,134 419,140 429,146" fill="#d6d3d1"/>

  <!-- Separator -->
  <line x1="80" y1="250" x2="600" y2="250" stroke="#e7e5e4" stroke-width="1"/>

  <!-- The Human Bridge (spanning) -->
  <rect x="80" y="280" width="520" height="120" rx="6" fill="white" stroke="#1c1917" stroke-width="1.5"/>
  <text x="340" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917">THE HUMAN BRIDGE</text>

  <!-- Technical Bridge (left half) -->
  <rect x="100" y="318" width="230" height="65" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="215" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Technical Bridge</text>
  <text x="215" y="357" text-anchor="middle" font-size="9" fill="#3b82f6">Systems, drift, orchestration</text>
  <text x="215" y="372" text-anchor="middle" font-size="9" fill="#3b82f6">Execution fidelity</text>

  <!-- Human Extraction Layer (right half) -->
  <rect x="350" y="318" width="230" height="65" rx="4" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="465" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#7e22ce">Human Extraction Layer</text>
  <text x="465" y="357" text-anchor="middle" font-size="9" fill="#a855f7">Signal, nuance, cadence</text>
  <text x="465" y="372" text-anchor="middle" font-size="9" fill="#a855f7">Human authenticity</text>

  <!-- Arrow from gap down to bridge -->
  <path d="M 340 200 L 340 280" stroke="#1c1917" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="334,276 340,286 346,276" fill="#1c1917"/>
  <text x="362" y="240" font-size="9" fill="#1c1917">fills the gap</text>

  <!-- Arrow from bridge back up left (requirements) -->
  <path d="M 140 280 Q 140 240 140 210" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="134,214 140,204 146,214" fill="#3b82f6"/>
  <text x="115" y="248" font-size="8" fill="#3b82f6" transform="rotate(-90, 115, 248)">requirements</text>

  <!-- Arrow from bridge back up right (adoption) -->
  <path d="M 540 280 Q 540 240 540 210" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="534,214 540,204 546,214" fill="#a855f7"/>
  <text x="562" y="248" font-size="8" fill="#a855f7" transform="rotate(90, 562, 248)">adoption</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 760" fill="none">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafaf9"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="680" height="760" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <text x="340" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1c1917" letter-spacing="0.08em">HIVE TODAY TO HIVE NEXT</text>
  <text x="340" y="52" text-anchor="middle" font-size="10" fill="#78716c">The shipped management layer in the middle. The provider-agnostic interface above it.</text>

  <rect x="26" y="86" width="188" height="510" rx="14" fill="url(#soft)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="46" y="114" font-size="12" font-weight="700" fill="#1c1917">Today</text>
  <text x="46" y="132" font-size="9.5" fill="#78716c">What already exists and scales on one machine.</text>

  <rect x="46" y="154" width="148" height="138" rx="12" fill="#111827"/>
  <rect x="58" y="168" width="124" height="14" rx="5" fill="#1f2937"/>
  <circle cx="68" cy="175" r="2.5" fill="#22c55e"/>
  <text x="78" y="179" font-size="7" font-weight="700" fill="#d6d3d1">Q1  auth refactor</text>
  <rect x="58" y="188" width="124" height="14" rx="5" fill="#1f2937"/>
  <circle cx="68" cy="195" r="2.5" fill="#3b82f6"/>
  <text x="78" y="199" font-size="7" font-weight="700" fill="#d6d3d1">Q2  dashboard</text>
  <rect x="58" y="208" width="124" height="14" rx="5" fill="#1f2937"/>
  <circle cx="68" cy="215" r="2.5" fill="#f97316"/>
  <text x="78" y="219" font-size="7" font-weight="700" fill="#d6d3d1">Q3  automation</text>
  <rect x="58" y="228" width="124" height="14" rx="5" fill="#1f2937"/>
  <circle cx="68" cy="235" r="2.5" fill="#22c55e"/>
  <text x="78" y="239" font-size="7" font-weight="700" fill="#d6d3d1">Q4  audit</text>
  <rect x="58" y="248" width="124" height="14" rx="5" fill="#1f2937"/>
  <circle cx="68" cy="255" r="2.5" fill="#22c55e"/>
  <text x="78" y="259" font-size="7" font-weight="700" fill="#d6d3d1">Q5  tests</text>
  <rect x="58" y="268" width="124" height="10" rx="5" fill="#1f2937"/>
  <text x="120" y="275" text-anchor="middle" font-size="6.5" fill="#9ca3af">...through Q8</text>
  <text x="120" y="310" text-anchor="middle" font-size="9" font-weight="600" fill="#57534e">Local terminal stack</text>
  <text x="120" y="324" text-anchor="middle" font-size="8" fill="#a8a29e">Full-width strips stacked top to bottom.</text>

  <line x1="120" y1="338" x2="120" y2="358" stroke="#d6d3d1" stroke-width="1.2"/>
  <polygon points="115,354 120,362 125,354" fill="#d6d3d1"/>
  <text x="120" y="376" text-anchor="middle" font-size="8" fill="#78716c">mirrored 1:1</text>

  <rect x="76" y="390" width="88" height="146" rx="18" fill="#18181b" stroke="#44403c" stroke-width="1"/>
  <rect x="106" y="398" width="28" height="5" rx="2.5" fill="#44403c"/>
  <rect x="88" y="414" width="64" height="16" rx="8" fill="#111827"/>
  <text x="120" y="425" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fafaf9">HIVE</text>
  <rect x="88" y="438" width="64" height="12" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="120" y="446" text-anchor="middle" font-size="5.8" font-weight="700" fill="#166534">Q1  working</text>
  <rect x="88" y="454" width="64" height="12" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="120" y="462" text-anchor="middle" font-size="5.8" font-weight="700" fill="#166534">Q2  working</text>
  <rect x="88" y="470" width="64" height="12" rx="6" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="120" y="478" text-anchor="middle" font-size="5.8" font-weight="700" fill="#92400e">Q3  needs you</text>
  <rect x="88" y="486" width="64" height="12" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="494" text-anchor="middle" font-size="5.8" font-weight="700" fill="#991b1b">Q4  done</text>
  <rect x="88" y="502" width="64" height="12" rx="6" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="120" y="510" text-anchor="middle" font-size="5.8" font-weight="700" fill="#57534e">Q5-Q8 below</text>
  <text x="120" y="556" text-anchor="middle" font-size="9" font-weight="600" fill="#57534e">Vertical dashboard</text>
  <text x="120" y="570" text-anchor="middle" font-size="8" fill="#a8a29e">Same order. Same stack.</text>

  <line x1="228" y1="342" x2="250" y2="342" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="246,337 256,342 246,347" fill="#d6d3d1"/>
  <text x="241" y="328" text-anchor="middle" font-size="8" fill="#78716c">what ships now</text>

  <rect x="260" y="86" width="160" height="510" rx="14" fill="#1c1917" filter="url(#shadow)"/>
  <text x="340" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#fafaf9">Management Layer</text>
  <text x="340" y="132" text-anchor="middle" font-size="9.5" fill="#a8a29e">The real product edge today.</text>

  <rect x="286" y="146" width="108" height="18" rx="9" fill="#fafaf9" fill-opacity="0.12" stroke="#57534e" stroke-width="1"/>
  <text x="340" y="158" text-anchor="middle" font-size="7.2" font-weight="700" fill="#fafaf9">1-8 agents, one stack</text>

  <rect x="282" y="172" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="193" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Vertical stack map</text>
  <rect x="282" y="216" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="237" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Stoplight status</text>
  <rect x="282" y="260" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Direct messaging</text>
  <rect x="282" y="304" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="325" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Routed handoffs</text>
  <rect x="282" y="348" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="369" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">File locks</text>
  <rect x="282" y="392" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="413" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Task queue</text>
  <rect x="282" y="436" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="457" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Compound learning</text>
  <rect x="282" y="480" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="501" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Autopilot + watchdog</text>

  <rect x="282" y="524" width="116" height="50" rx="14" fill="#fafaf9"/>
  <text x="340" y="545" text-anchor="middle" font-size="9" font-weight="700" fill="#1c1917">What Hive proves</text>
  <text x="340" y="560" text-anchor="middle" font-size="8" fill="#57534e">A human can run a mixed fleet</text>
  <text x="340" y="571" text-anchor="middle" font-size="8" fill="#57534e">and keep one stable top-to-bottom order.</text>

  <line x1="434" y1="342" x2="456" y2="342" stroke="#d6d3d1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="452,337 462,342 452,347" fill="#d6d3d1"/>
  <text x="447" y="328" text-anchor="middle" font-size="8" fill="#78716c">next layer up</text>

  <rect x="466" y="86" width="188" height="510" rx="14" fill="url(#soft)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="486" y="114" font-size="12" font-weight="700" fill="#1c1917">Next</text>
  <text x="486" y="132" font-size="9.5" fill="#78716c">The broader provider-agnostic interface.</text>

  <rect x="486" y="156" width="148" height="158" rx="12" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="178" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1c1917">Runtimes and providers</text>
  <rect x="500" y="194" width="120" height="24" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="210" text-anchor="middle" font-size="8.5" fill="#44403c">Anthropic  Claude Code</text>
  <rect x="500" y="226" width="120" height="24" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="242" text-anchor="middle" font-size="8.5" fill="#44403c">OpenAI  Codex and GPT</text>
  <rect x="500" y="258" width="120" height="24" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="274" text-anchor="middle" font-size="8.5" fill="#44403c">Google  Gemini and CLI</text>
  <rect x="500" y="290" width="120" height="24" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="306" text-anchor="middle" font-size="8.5" fill="#44403c">Custom  local runtimes</text>

  <line x1="560" y1="314" x2="560" y2="338" stroke="#d6d3d1" stroke-width="1.2"/>
  <polygon points="555,334 560,342 565,334" fill="#d6d3d1"/>

  <rect x="512" y="350" width="96" height="164" rx="18" fill="#18181b" stroke="#44403c" stroke-width="1"/>
  <rect x="546" y="358" width="28" height="5" rx="2.5" fill="#44403c"/>
  <rect x="522" y="374" width="76" height="16" rx="8" fill="#111827"/>
  <text x="560" y="385" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fafaf9">UNIVERSAL VIEW</text>
  <rect x="522" y="398" width="76" height="12" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="560" y="406" text-anchor="middle" font-size="5.8" font-weight="700" fill="#166534">A  Anthropic runtime</text>
  <rect x="522" y="414" width="76" height="12" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="560" y="422" text-anchor="middle" font-size="5.8" font-weight="700" fill="#1d4ed8">O  OpenAI runtime</text>
  <rect x="522" y="430" width="76" height="12" rx="6" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="560" y="438" text-anchor="middle" font-size="5.8" font-weight="700" fill="#92400e">G  Google runtime</text>
  <rect x="522" y="446" width="76" height="12" rx="6" fill="#f3f4f6" stroke="#a8a29e" stroke-width="1"/>
  <text x="560" y="454" text-anchor="middle" font-size="5.8" font-weight="700" fill="#57534e">+  Custom runtime</text>
  <rect x="522" y="462" width="76" height="12" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="560" y="470" text-anchor="middle" font-size="5.8" font-weight="700" fill="#166534">...stack continues below</text>
  <text x="560" y="534" text-anchor="middle" font-size="9" font-weight="600" fill="#57534e">One visual layer</text>
  <text x="560" y="548" text-anchor="middle" font-size="8" fill="#a8a29e">Any provider or runtime. Same vertical stoplights.</text>

  <rect x="486" y="538" width="148" height="36" rx="12" fill="none" stroke="#a8a29e" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="560" y="560" text-anchor="middle" font-size="8.5" fill="#57534e">Fleet operations above providers</text>

  <rect x="26" y="620" width="628" height="112" rx="14" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="646" text-anchor="middle" font-size="11" font-weight="700" fill="#1c1917">What the diagram is really saying</text>
  <text x="340" y="668" text-anchor="middle" font-size="9" fill="#57534e">Hive is already the management layer for local fleets up to eight agents.</text>
  <text x="340" y="684" text-anchor="middle" font-size="9" fill="#57534e">The end state is not a replacement for Claude, Codex, or Gemini. It is the same vertical layer widened across more of them.</text>
  <text x="340" y="700" text-anchor="middle" font-size="9" fill="#57534e">Local stacks on the left. Management in the middle. Provider-agnostic fleet interface on the right.</text>
</svg>

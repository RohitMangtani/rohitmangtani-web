  <text x="590" y="442" text-anchor="middle" font-size="5.6" font-weight="700" fill="#92400e">G</text>
  <rect x="530" y="460" width="60" height="12" rx="6" fill="#111827"/>
  <text x="560" y="468" text-anchor="middle" font-size="5.8" fill="#a8a29e">same adaptive grid</text>
  <text x="560" y="534" text-anchor="middle" font-size="9" font-weight="600" fill="#57534e">One visual layer</text>
  <text x="560" y="548" text-anchor="middle" font-size="8" fill="#a8a29e">Any provider or runtime. Same adaptive stoplights.</text>

  <rect x="486" y="538" width="148" height="36" rx="12" fill="none" stroke="#a8a29e" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="560" y="560" text-anchor="middle" font-size="8.5" fill="#57534e">Fleet operations above providers</text>

  <rect x="26" y="620" width="628" height="112" rx="14" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="646" text-anchor="middle" font-size="11" font-weight="700" fill="#1c1917">What the diagram is really saying</text>
  <text x="340" y="668" text-anchor="middle" font-size="9" fill="#57534e">Hive is already the management layer for local fleets up to eight agents.</text>
  <text x="340" y="684" text-anchor="middle" font-size="9" fill="#57534e">The end state is not a replacement for Claude, Codex, or Gemini. It is the same layer widened across more of them.</text>
  <text x="340" y="700" text-anchor="middle" font-size="9" fill="#57534e">Local terminals on the left. Management in the middle. Provider-agnostic fleet interface on the right.</text>

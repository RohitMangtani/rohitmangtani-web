<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 760" fill="none">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafaf9"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="680" height="760" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <text x="340" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1c1917" letter-spacing="0.08em">HIVE TODAY TO HIVE NEXT</text>
  <text x="340" y="52" text-anchor="middle" font-size="10" fill="#78716c">The shipped control plane in the middle. The provider-agnostic interface above it.</text>

  <rect x="26" y="86" width="188" height="510" rx="14" fill="url(#soft)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="46" y="114" font-size="12" font-weight="700" fill="#1c1917">Today</text>
  <text x="46" y="132" font-size="9.5" fill="#78716c">What already exists and works now.</text>

  <rect x="46" y="154" width="148" height="116" rx="12" fill="#111827"/>
  <rect x="58" y="166" width="56" height="42" rx="8" fill="#1f2937"/>
  <circle cx="68" cy="176" r="2.5" fill="#22c55e"/>
  <text x="78" y="180" font-size="6.5" font-weight="700" fill="#86efac">Claude</text>
  <text x="60" y="196" font-size="7" fill="#d6d3d1">Q1 auth refactor</text>
  <rect x="126" y="166" width="56" height="42" rx="8" fill="#1f2937"/>
  <circle cx="136" cy="176" r="2.5" fill="#22c55e"/>
  <text x="146" y="180" font-size="6.5" font-weight="700" fill="#86efac">Claude</text>
  <text x="128" y="196" font-size="7" fill="#d6d3d1">Q2 dashboard</text>
  <rect x="58" y="218" width="56" height="42" rx="8" fill="#1f2937"/>
  <circle cx="68" cy="228" r="2.5" fill="#eab308"/>
  <text x="78" y="232" font-size="6.5" font-weight="700" fill="#fde68a">Claude</text>
  <text x="60" y="248" font-size="7" fill="#d6d3d1">Q3 waiting</text>
  <rect x="126" y="218" width="56" height="42" rx="8" fill="#1f2937"/>
  <circle cx="136" cy="228" r="2.5" fill="#3b82f6"/>
  <text x="146" y="232" font-size="6.5" font-weight="700" fill="#93c5fd">Codex</text>
  <text x="128" y="248" font-size="7" fill="#d6d3d1">Q4 audit</text>
  <text x="120" y="286" text-anchor="middle" font-size="9" font-weight="600" fill="#57534e">Local terminals</text>
  <text x="120" y="300" text-anchor="middle" font-size="8" fill="#a8a29e">Claude and Codex mixed in one grid.</text>

  <line x1="120" y1="316" x2="120" y2="336" stroke="#d6d3d1" stroke-width="1.2"/>
  <polygon points="115,332 120,340 125,332" fill="#d6d3d1"/>
  <text x="120" y="354" text-anchor="middle" font-size="8" fill="#78716c">mirrored 1:1</text>

  <rect x="78" y="372" width="84" height="154" rx="18" fill="#18181b" stroke="#44403c" stroke-width="1"/>
  <rect x="106" y="380" width="28" height="5" rx="2.5" fill="#44403c"/>
  <rect x="90" y="396" width="60" height="18" rx="9" fill="#111827"/>
  <text x="120" y="408" text-anchor="middle" font-size="7" font-weight="700" fill="#fafaf9">HIVE</text>
  <rect x="90" y="422" width="26" height="34" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="103" y="436" text-anchor="middle" font-size="6.5" font-weight="700" fill="#166534">Q1</text>
  <rect x="124" y="422" width="26" height="34" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="137" y="436" text-anchor="middle" font-size="6.5" font-weight="700" fill="#166534">Q2</text>
  <rect x="90" y="464" width="26" height="34" rx="8" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="103" y="478" text-anchor="middle" font-size="6.5" font-weight="700" fill="#92400e">Q3</text>
  <rect x="124" y="464" width="26" height="34" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="137" y="478" text-anchor="middle" font-size="6.5" font-weight="700" fill="#1d4ed8">Q4</text>
  <text x="120" y="546" text-anchor="middle" font-size="9" font-weight="600" fill="#57534e">Hosted dashboard</text>
  <text x="120" y="560" text-anchor="middle" font-size="8" fill="#a8a29e">Stoplight status and messaging from anywhere.</text>

  <line x1="228" y1="342" x2="250" y2="342" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="246,337 256,342 246,347" fill="#d6d3d1"/>
  <text x="241" y="328" text-anchor="middle" font-size="8" fill="#78716c">what ships now</text>

  <rect x="260" y="86" width="160" height="510" rx="14" fill="#1c1917" filter="url(#shadow)"/>
  <text x="340" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#fafaf9">Coordination Layer</text>
  <text x="340" y="132" text-anchor="middle" font-size="9.5" fill="#a8a29e">The real product edge today.</text>

  <rect x="282" y="158" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="179" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Spatial mapping</text>
  <rect x="282" y="202" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="223" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Stoplight status</text>
  <rect x="282" y="246" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="267" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Direct messaging</text>
  <rect x="282" y="290" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="311" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Routed handoffs</text>
  <rect x="282" y="334" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">File locks</text>
  <rect x="282" y="378" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Task queue</text>
  <rect x="282" y="422" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="443" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Compound learning</text>
  <rect x="282" y="466" width="116" height="34" rx="12" fill="#292524"/>
  <text x="340" y="487" text-anchor="middle" font-size="9" font-weight="600" fill="#fafaf9">Autopilot + watchdog</text>

  <rect x="282" y="524" width="116" height="50" rx="14" fill="#fafaf9"/>
  <text x="340" y="545" text-anchor="middle" font-size="9" font-weight="700" fill="#1c1917">What Hive proves</text>
  <text x="340" y="560" text-anchor="middle" font-size="8" fill="#57534e">A human can run a small fleet</text>
  <text x="340" y="571" text-anchor="middle" font-size="8" fill="#57534e">without drowning in terminals.</text>

  <line x1="434" y1="342" x2="456" y2="342" stroke="#d6d3d1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="452,337 462,342 452,347" fill="#d6d3d1"/>
  <text x="447" y="328" text-anchor="middle" font-size="8" fill="#78716c">next layer up</text>

  <rect x="466" y="86" width="188" height="510" rx="14" fill="url(#soft)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="486" y="114" font-size="12" font-weight="700" fill="#1c1917">Next</text>
  <text x="486" y="132" font-size="9.5" fill="#78716c">The broader provider-agnostic interface.</text>

  <rect x="486" y="156" width="148" height="146" rx="12" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="178" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1c1917">Model providers</text>
  <rect x="500" y="194" width="120" height="24" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="210" text-anchor="middle" font-size="8.5" fill="#44403c">Anthropic  Claude Code</text>
  <rect x="500" y="226" width="120" height="24" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="242" text-anchor="middle" font-size="8.5" fill="#44403c">OpenAI  Codex and GPT</text>
  <rect x="500" y="258" width="120" height="24" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="274" text-anchor="middle" font-size="8.5" fill="#44403c">Google  Gemini and Jules</text>

  <line x1="560" y1="302" x2="560" y2="326" stroke="#d6d3d1" stroke-width="1.2"/>
  <polygon points="555,322 560,330 565,322" fill="#d6d3d1"/>

  <rect x="516" y="338" width="88" height="152" rx="18" fill="#18181b" stroke="#44403c" stroke-width="1"/>
  <rect x="546" y="346" width="28" height="5" rx="2.5" fill="#44403c"/>
  <rect x="528" y="362" width="64" height="16" rx="8" fill="#111827"/>
  <text x="560" y="373" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fafaf9">UNIVERSAL VIEW</text>
  <rect x="528" y="386" width="28" height="34" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="542" y="399" text-anchor="middle" font-size="6.5" font-weight="700" fill="#166534">A</text>
  <rect x="564" y="386" width="28" height="34" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="578" y="399" text-anchor="middle" font-size="6.5" font-weight="700" fill="#1d4ed8">O</text>
  <rect x="528" y="428" width="28" height="34" rx="8" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="542" y="441" text-anchor="middle" font-size="6.5" font-weight="700" fill="#92400e">G</text>
  <rect x="564" y="428" width="28" height="34" rx="8" fill="#f3f4f6" stroke="#a8a29e" stroke-width="1"/>
  <text x="578" y="441" text-anchor="middle" font-size="6.5" font-weight="700" fill="#57534e">+</text>
  <text x="560" y="512" text-anchor="middle" font-size="9" font-weight="600" fill="#57534e">One visual layer</text>
  <text x="560" y="526" text-anchor="middle" font-size="8" fill="#a8a29e">Any provider. Same stoplights.</text>

  <rect x="486" y="538" width="148" height="36" rx="12" fill="none" stroke="#a8a29e" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="560" y="560" text-anchor="middle" font-size="8.5" fill="#57534e">Natural-language fleet operations</text>

  <rect x="26" y="620" width="628" height="112" rx="14" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="646" text-anchor="middle" font-size="11" font-weight="700" fill="#1c1917">What the diagram is really saying</text>
  <text x="340" y="668" text-anchor="middle" font-size="9" fill="#57534e">Hive is already the control plane for local multi-agent work.</text>
  <text x="340" y="684" text-anchor="middle" font-size="9" fill="#57534e">The end state is not a different idea. It is the same control plane widened into a universal interface.</text>
  <text x="340" y="700" text-anchor="middle" font-size="9" fill="#57534e">Local terminals on the left. Provider-agnostic fleet layer on the right. Coordination stays in the middle.</text>
</svg>

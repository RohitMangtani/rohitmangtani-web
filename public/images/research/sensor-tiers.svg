<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="420" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">THE THREE TIERS</text>

  <!-- Value flow arrow (left side) -->
  <line x1="60" y1="80" x2="60" y2="360" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="54,84 60,72 66,84" fill="#d6d3d1"/>
  <text x="60" y="390" text-anchor="middle" font-size="9" fill="#a8a29e">VALUE CONCENTRATION</text>

  <!-- Tier 1: Sensor Layer -->
  <rect x="100" y="60" width="520" height="90" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="130" cy="95" r="12" fill="#22c55e" opacity="0.15"/>
  <circle cx="130" cy="95" r="6" fill="#22c55e"/>
  <text x="156" y="88" font-size="14" font-weight="600" fill="#1c1917">SENSOR LAYER</text>
  <text x="156" y="106" font-size="11" fill="#44403c">Detects what matters. Directs AI. Compounds with scale.</text>
  <text x="156" y="128" font-size="10" fill="#a8a29e">Taste, judgment, direction. The bottleneck in a system where execution is free.</text>
  <text x="580" y="100" text-anchor="end" font-size="10" font-family="'SF Mono', 'Fira Code', monospace" fill="#22c55e">compounds</text>

  <!-- Arrow down -->
  <line x1="340" y1="150" x2="340" y2="170" stroke="#e7e5e4" stroke-width="1.5"/>
  <polygon points="334,166 340,176 346,166" fill="#e7e5e4"/>

  <!-- Tier 2: Node Layer -->
  <rect x="100" y="178" width="520" height="90" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="130" cy="213" r="12" fill="#f59e0b" opacity="0.15"/>
  <circle cx="130" cy="213" r="6" fill="#f59e0b"/>
  <text x="156" y="206" font-size="14" font-weight="600" fill="#1c1917">NODE LAYER</text>
  <text x="156" y="224" font-size="11" fill="#44403c">Shows up. Verifies. Participates. Lends human presence to automated systems.</text>
  <text x="156" y="246" font-size="10" fill="#a8a29e">Regulatory sign-off, AI supervision, identity. The job is being human.</text>
  <text x="580" y="218" text-anchor="end" font-size="10" font-family="'SF Mono', 'Fira Code', monospace" fill="#f59e0b">participates</text>

  <!-- Arrow down -->
  <line x1="340" y1="268" x2="340" y2="288" stroke="#e7e5e4" stroke-width="1.5"/>
  <polygon points="334,284 340,294 346,284" fill="#e7e5e4"/>

  <!-- Tier 3: Floor -->
  <rect x="100" y="296" width="520" height="90" rx="6" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="130" cy="331" r="12" fill="#a8a29e" opacity="0.15"/>
  <circle cx="130" cy="331" r="6" fill="#a8a29e"/>
  <text x="156" y="324" font-size="14" font-weight="600" fill="#1c1917">FLOOR</text>
  <text x="156" y="342" font-size="11" fill="#44403c">Maintained by the system. UBI or equivalent. Stability, not generosity.</text>
  <text x="156" y="364" font-size="10" fill="#a8a29e">System maintenance. The minimum to prevent instability.</text>
  <text x="580" y="336" text-anchor="end" font-size="10" font-family="'SF Mono', 'Fira Code', monospace" fill="#a8a29e">catches</text>

  <!-- Dividing line label -->
  <text x="640" y="170" text-anchor="end" font-size="9" fill="#a8a29e" font-style="italic">AI compounds here</text>
  <line x1="520" y1="166" x2="620" y2="166" stroke="#d6d3d1" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="640" y="292" text-anchor="end" font-size="9" fill="#a8a29e" font-style="italic">AI displaces here</text>
  <line x1="520" y1="288" x2="620" y2="288" stroke="#d6d3d1" stroke-width="0.5" stroke-dasharray="4,3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="480" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">FIND MY AGENTS</text>

  <!-- Device frame -->
  <rect x="40" y="56" width="600" height="400" rx="12" fill="white" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Left panel: Agent list -->
  <rect x="40" y="56" width="220" height="400" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>
  <rect x="260" y="56" width="1" height="400" fill="#e7e5e4"/>

  <!-- List header -->
  <text x="60" y="84" font-size="14" font-weight="600" fill="#1c1917">All Agents</text>
  <text x="60" y="100" font-size="10" fill="#a8a29e">4 active, 1 needs direction</text>

  <!-- Agent 1: Research -->
  <rect x="50" y="114" width="200" height="56" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="142" r="6" fill="#22c55e"/>
  <text x="82" y="136" font-size="11" font-weight="500" fill="#1c1917">Research Agent</text>
  <text x="82" y="150" font-size="10" fill="#a8a29e">Sourcing references... 12 found</text>

  <!-- Agent 2: Writer -->
  <rect x="50" y="178" width="200" height="56" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="206" r="6" fill="#22c55e"/>
  <text x="82" y="200" font-size="11" font-weight="500" fill="#1c1917">Writer Agent</text>
  <text x="82" y="214" font-size="10" fill="#a8a29e">Drafting section 3 of 6</text>

  <!-- Agent 3: Design (RED - needs direction) -->
  <rect x="50" y="242" width="200" height="56" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <circle cx="68" cy="270" r="6" fill="#ef4444"/>
  <circle cx="68" cy="270" r="9" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <text x="82" y="264" font-size="11" font-weight="500" fill="#1c1917">Design Agent</text>
  <text x="82" y="278" font-size="10" fill="#ef4444">Needs direction: diagram style?</text>

  <!-- Agent 4: Builder -->
  <rect x="50" y="306" width="200" height="56" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="334" r="6" fill="#22c55e"/>
  <text x="82" y="328" font-size="11" font-weight="500" fill="#1c1917">Builder Agent</text>
  <text x="82" y="342" font-size="10" fill="#a8a29e">Compiling routes, 89% done</text>

  <!-- Agent 5: QA -->
  <rect x="50" y="370" width="200" height="56" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="68" cy="398" r="6" fill="#22c55e"/>
  <text x="82" y="392" font-size="11" font-weight="500" fill="#1c1917">QA Agent</text>
  <text x="82" y="406" font-size="10" fill="#a8a29e">Waiting on Builder, queued</text>

  <!-- Right panel: Map view -->
  <!-- Subtle grid -->
  <line x1="280" y1="100" x2="280" y2="440" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="340" y1="100" x2="340" y2="440" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="400" y1="100" x2="400" y2="440" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="460" y1="100" x2="460" y2="440" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="520" y1="100" x2="520" y2="440" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="580" y1="100" x2="580" y2="440" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="270" y1="140" x2="630" y2="140" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="270" y1="200" x2="630" y2="200" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="270" y1="260" x2="630" y2="260" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="270" y1="320" x2="630" y2="320" stroke="#f5f5f4" stroke-width="1"/>
  <line x1="270" y1="380" x2="630" y2="380" stroke="#f5f5f4" stroke-width="1"/>

  <!-- Map header -->
  <text x="280" y="84" font-size="12" font-weight="500" fill="#1c1917">Agent Map</text>
  <text x="550" y="84" font-size="10" fill="#a8a29e">Live view</text>
  <!-- Pulse indicator -->
  <circle cx="600" cy="80" r="3" fill="#22c55e"/>

  <!-- Agent dots on map with labels -->
  <!-- Research Agent - top area -->
  <circle cx="350" cy="160" r="10" fill="#22c55e" opacity="0.15"/>
  <circle cx="350" cy="160" r="5" fill="#22c55e"/>
  <text x="362" y="164" font-size="9" fill="#44403c">Research</text>

  <!-- Writer Agent - middle left -->
  <circle cx="440" cy="240" r="10" fill="#22c55e" opacity="0.15"/>
  <circle cx="440" cy="240" r="5" fill="#22c55e"/>
  <text x="452" y="244" font-size="9" fill="#44403c">Writer</text>

  <!-- Design Agent - RED with pulse rings -->
  <circle cx="380" cy="330" r="18" fill="#ef4444" opacity="0.06"/>
  <circle cx="380" cy="330" r="12" fill="#ef4444" opacity="0.12"/>
  <circle cx="380" cy="330" r="6" fill="#ef4444"/>
  <text x="394" y="334" font-size="9" font-weight="500" fill="#ef4444">Design</text>
  <!-- Ping label -->
  <rect x="354" y="348" width="80" height="18" rx="9" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="394" y="360" text-anchor="middle" font-size="8" fill="#ef4444">needs direction</text>

  <!-- Builder Agent - bottom right -->
  <circle cx="530" cy="300" r="10" fill="#22c55e" opacity="0.15"/>
  <circle cx="530" cy="300" r="5" fill="#22c55e"/>
  <text x="542" y="304" font-size="9" fill="#44403c">Builder</text>

  <!-- QA Agent - bottom, waiting -->
  <circle cx="500" cy="390" r="10" fill="#22c55e" opacity="0.08"/>
  <circle cx="500" cy="390" r="5" fill="#a8a29e"/>
  <text x="512" y="394" font-size="9" fill="#a8a29e">QA (queued)</text>

  <!-- Connection lines between agents showing workflow -->
  <line x1="355" y1="165" x2="435" y2="235" stroke="#e7e5e4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="245" x2="385" y2="325" stroke="#e7e5e4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="245" x2="525" y2="295" stroke="#e7e5e4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="530" y1="305" x2="505" y2="385" stroke="#e7e5e4" stroke-width="1" stroke-dasharray="3,3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafaf9"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="900" height="620" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <text x="450" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1c1917" letter-spacing="0.08em">THE VISUAL WORKFLOW</text>
  <text x="450" y="52" text-anchor="middle" font-size="10" fill="#78716c">What Hive changes: not the models themselves, but the way you see, steer, and combine them.</text>

  <rect x="28" y="78" width="250" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="48" y="106" font-size="12" font-weight="700" fill="#1c1917">1. Your machine</text>
  <text x="48" y="124" font-size="9.5" fill="#78716c">Four local terminals doing real work.</text>

  <rect x="48" y="148" width="96" height="84" rx="10" fill="#111827"/>
  <rect x="56" y="156" width="80" height="12" rx="6" fill="#1f2937"/>
  <circle cx="64" cy="162" r="2" fill="#22c55e"/>
  <text x="74" y="165" font-size="6.5" font-weight="700" fill="#86efac">Claude</text>
  <text x="58" y="184" font-size="8" fill="#d6d3d1">Q1  auth refactor</text>
  <text x="58" y="198" font-size="7" fill="#9ca3af">$ pnpm test auth</text>
  <text x="58" y="210" font-size="7" fill="#6b7280">passing 14/14</text>

  <rect x="158" y="148" width="96" height="84" rx="10" fill="#111827"/>
  <rect x="166" y="156" width="80" height="12" rx="6" fill="#1f2937"/>
  <circle cx="174" cy="162" r="2" fill="#3b82f6"/>
  <text x="184" y="165" font-size="6.5" font-weight="700" fill="#93c5fd">Codex</text>
  <text x="168" y="184" font-size="8" fill="#d6d3d1">Q2  dashboard bug</text>
  <text x="168" y="198" font-size="7" fill="#9ca3af">$ tracing websocket</text>
  <text x="168" y="210" font-size="7" fill="#6b7280">watching events...</text>

  <rect x="48" y="244" width="96" height="84" rx="10" fill="#111827"/>
  <rect x="56" y="252" width="80" height="12" rx="6" fill="#1f2937"/>
  <circle cx="64" cy="258" r="2" fill="#f97316"/>
  <text x="74" y="261" font-size="6.5" font-weight="700" fill="#fdba74">OpenClaw</text>
  <text x="58" y="280" font-size="8" fill="#d6d3d1">Q3  broad automation</text>
  <text x="58" y="294" font-size="7" fill="#9ca3af">$ collecting outputs</text>
  <text x="58" y="306" font-size="7" fill="#6b7280">bridging the tools</text>

  <rect x="158" y="244" width="96" height="84" rx="10" fill="#111827"/>
  <rect x="166" y="252" width="80" height="12" rx="6" fill="#1f2937"/>
  <circle cx="174" cy="258" r="2" fill="#3b82f6"/>
  <text x="184" y="261" font-size="6.5" font-weight="700" fill="#93c5fd">Codex</text>
  <text x="168" y="280" font-size="8" fill="#d6d3d1">Q4  system audit</text>
  <text x="168" y="294" font-size="7" fill="#9ca3af">$ checking drift</text>
  <text x="168" y="306" font-size="7" fill="#6b7280">cross-model review</text>

  <text x="153" y="354" text-anchor="middle" font-size="9.5" font-weight="600" fill="#57534e">The layout on screen matters.</text>
  <text x="153" y="369" text-anchor="middle" font-size="8.5" fill="#a8a29e">Top-left terminal becomes the top-left tile.</text>

  <line x1="292" y1="228" x2="322" y2="228" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="318,223 328,228 318,233" fill="#d6d3d1"/>
  <text x="309" y="214" text-anchor="middle" font-size="8.5" fill="#78716c">mirrored 1:1</text>

  <rect x="336" y="78" width="250" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="356" y="106" font-size="12" font-weight="700" fill="#1c1917">2. Hosted dashboard</text>
  <text x="356" y="124" font-size="9.5" fill="#78716c">The same grid, visible from your phone.</text>

  <rect x="408" y="146" width="104" height="180" rx="22" fill="#18181b" stroke="#44403c" stroke-width="1"/>
  <rect x="444" y="154" width="32" height="6" rx="3" fill="#44403c"/>
  <rect x="420" y="170" width="80" height="20" rx="10" fill="#111827"/>
  <text x="460" y="184" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fafaf9">HIVE</text>
  <rect x="420" y="198" width="36" height="46" rx="10" fill="#22c55e" fill-opacity="0.16" stroke="#22c55e" stroke-width="1"/>
  <text x="438" y="216" text-anchor="middle" font-size="7" font-weight="700" fill="#166534">Q1</text>
  <text x="438" y="228" text-anchor="middle" font-size="6.5" fill="#166534">working</text>
  <rect x="464" y="198" width="36" height="46" rx="10" fill="#22c55e" fill-opacity="0.16" stroke="#22c55e" stroke-width="1"/>
  <text x="482" y="216" text-anchor="middle" font-size="7" font-weight="700" fill="#166534">Q2</text>
  <text x="482" y="228" text-anchor="middle" font-size="6.5" fill="#166534">working</text>
  <rect x="420" y="252" width="36" height="46" rx="10" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="438" y="270" text-anchor="middle" font-size="7" font-weight="700" fill="#92400e">Q3</text>
  <text x="438" y="282" text-anchor="middle" font-size="6.5" fill="#92400e">needs you</text>
  <rect x="464" y="252" width="36" height="46" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="482" y="270" text-anchor="middle" font-size="7" font-weight="700" fill="#1d4ed8">Q4</text>
  <text x="482" y="282" text-anchor="middle" font-size="6.5" fill="#1d4ed8">auditing</text>
  <rect x="420" y="304" width="80" height="10" rx="5" fill="#111827"/>
  <text x="460" y="312" text-anchor="middle" font-size="6.5" fill="#a8a29e">one grid, three runtimes</text>

  <text x="460" y="354" text-anchor="middle" font-size="9.5" font-weight="600" fill="#57534e">You do not read four terminals anymore.</text>
  <text x="460" y="369" text-anchor="middle" font-size="8.5" fill="#a8a29e">You glance at four positions and know what matters.</text>

  <line x1="600" y1="228" x2="630" y2="228" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="626,223 636,228 626,233" fill="#d6d3d1"/>
  <text x="615" y="214" text-anchor="middle" font-size="8.5" fill="#78716c">human steers</text>

  <rect x="644" y="78" width="228" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="664" y="106" font-size="12" font-weight="700" fill="#1c1917">3. Steering loop</text>
  <text x="664" y="124" font-size="9.5" fill="#78716c">What the visual layer actually unlocks.</text>

  <rect x="664" y="148" width="188" height="46" rx="12" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="682" cy="171" r="6" fill="#eab308"/>
  <text x="698" y="167" font-size="9.5" font-weight="600" fill="#1c1917">Notice a yellow tile.</text>
  <text x="698" y="181" font-size="8.5" fill="#78716c">Your eye goes there before you read anything.</text>

  <rect x="664" y="206" width="188" height="46" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="682" cy="229" r="6" fill="#3b82f6"/>
  <text x="698" y="225" font-size="9.5" font-weight="600" fill="#1c1917">Tap and send direction.</text>
  <text x="698" y="239" font-size="8.5" fill="#78716c">"Summarize what Q1 and Q2 found."</text>

  <rect x="664" y="264" width="188" height="46" rx="12" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="682" cy="287" r="6" fill="#22c55e"/>
  <text x="698" y="283" font-size="9.5" font-weight="600" fill="#1c1917">Route a handoff.</text>
  <text x="698" y="297" font-size="8.5" fill="#78716c">Claude researches. Codex builds. OpenClaw widens the run.</text>

  <rect x="664" y="322" width="188" height="46" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <circle cx="682" cy="345" r="6" fill="#a855f7"/>
  <text x="698" y="341" font-size="9.5" font-weight="600" fill="#1c1917">Audit across models.</text>
  <text x="698" y="355" font-size="8.5" fill="#78716c">One model catches drift another one missed.</text>

  <line x1="40" y1="406" x2="860" y2="406" stroke="#e7e5e4" stroke-width="1"/>
  <text x="450" y="426" text-anchor="middle" font-size="10" fill="#a8a29e">What the daemon is doing underneath.</text>

  <rect x="40" y="444" width="820" height="92" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="64" y="468" font-size="11" font-weight="700" fill="#1c1917">The coordination layer</text>
  <text x="64" y="486" font-size="9" fill="#a8a29e">This is why the visual layer works in practice, not just in theory.</text>

  <text x="64" y="512" font-size="8.8" fill="#44403c">Window-position mapping</text>
  <text x="188" y="512" font-size="8.8" fill="#44403c">Status detection</text>
  <text x="290" y="512" font-size="8.8" fill="#44403c">Messaging</text>
  <text x="364" y="512" font-size="8.8" fill="#44403c">Workflow handoffs</text>
  <text x="478" y="512" font-size="8.8" fill="#44403c">Cross-runtime use</text>
  <text x="582" y="512" font-size="8.8" fill="#44403c">Autopilot + watchdog</text>
  <text x="718" y="512" font-size="8.8" fill="#44403c">Learned context</text>

  <text x="64" y="528" font-size="8" fill="#a8a29e">Top-left terminal stays top-left tile</text>
  <text x="188" y="528" font-size="8" fill="#a8a29e">Hook, JSONL, CPU, and PTY signals</text>
  <text x="290" y="528" font-size="8" fill="#a8a29e">Direct messages from any device</text>
  <text x="364" y="528" font-size="8" fill="#a8a29e">Focused summaries, not a shared mind</text>
  <text x="478" y="528" font-size="8" fill="#a8a29e">Claude, Codex, and OpenClaw in one grid</text>
  <text x="582" y="528" font-size="8" fill="#a8a29e">Routine interruptions handled automatically</text>
  <text x="718" y="528" font-size="8" fill="#a8a29e">Project learnings compound over time</text>

  <line x1="40" y1="560" x2="860" y2="560" stroke="#e7e5e4" stroke-width="1"/>
  <text x="450" y="584" text-anchor="middle" font-size="10" fill="#44403c">Hive is not another model or a replacement for the tools underneath.</text>
  <text x="450" y="600" text-anchor="middle" font-size="10" font-weight="600" fill="#1c1917">It is the management layer that lets you finally see enough to direct all of them.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="580" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.06em">HOW YOU BUILD</text>
  <text x="340" y="52" text-anchor="middle" font-size="10" fill="#a8a29e">The same idea, two development experiences.</text>

  <!-- ═══════════ LEFT: WITHOUT THE VISUAL LAYER ═══════════ -->
  <rect x="30" y="72" width="300" height="440" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="180" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1c1917" letter-spacing="0.04em">WITHOUT THE VISUAL LAYER</text>
  <text x="180" y="112" text-anchor="middle" font-size="9" fill="#a8a29e">How everyone builds with AI today.</text>

  <!-- Step 1: Idea -->
  <rect x="60" y="130" width="240" height="36" rx="4" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="180" y="152" text-anchor="middle" font-size="10" fill="#166534">You have an idea in your head. You can see it.</text>

  <!-- Arrow -->
  <line x1="180" y1="170" x2="180" y2="188" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="174,184 180,194 186,184" fill="#d6d3d1"/>

  <!-- Step 2: Describe -->
  <rect x="60" y="196" width="240" height="36" rx="4" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="180" y="218" text-anchor="middle" font-size="10" fill="#44403c">Describe it in text to the AI.</text>

  <!-- Arrow -->
  <line x1="180" y1="236" x2="180" y2="254" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="174,250 180,260 186,250" fill="#d6d3d1"/>

  <!-- Step 3: AI builds (blind) -->
  <rect x="60" y="262" width="240" height="36" rx="4" fill="#1c1917"/>
  <text x="180" y="284" text-anchor="middle" font-size="10" font-family="'SF Mono', 'Fira Code', monospace" fill="#78716c">AI builds. You cannot see it.</text>

  <!-- Arrow -->
  <line x1="180" y1="302" x2="180" y2="320" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="174,316 180,326 186,316" fill="#d6d3d1"/>

  <!-- Step 4: Read output -->
  <rect x="60" y="328" width="240" height="36" rx="4" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="180" y="350" text-anchor="middle" font-size="10" fill="#44403c">Read text output. Parse. Interpret.</text>

  <!-- Arrow -->
  <line x1="180" y1="368" x2="180" y2="386" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="174,382 180,392 186,382" fill="#d6d3d1"/>

  <!-- Step 5: Hope -->
  <rect x="60" y="394" width="240" height="36" rx="4" fill="#fef9c3" stroke="#fef08a" stroke-width="1"/>
  <text x="180" y="416" text-anchor="middle" font-size="10" fill="#854d0e">Hope it matches what was in your head.</text>

  <!-- Loop arrow -->
  <path d="M 300 412 L 316 412 L 316 214 L 300 214" stroke="#d6d3d1" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="302,208 292,214 302,220" fill="#d6d3d1"/>
  <text x="326" y="316" font-size="8" fill="#a8a29e" transform="rotate(90, 326, 316)">Repeat. Still blind.</text>

  <!-- Left caption -->
  <text x="180" y="460" text-anchor="middle" font-size="9" fill="#a8a29e">The idea degrades through every text translation.</text>
  <text x="180" y="474" text-anchor="middle" font-size="9" fill="#a8a29e">You never see what is being built.</text>
  <text x="180" y="494" text-anchor="middle" font-size="10" font-weight="500" fill="#1c1917">Building blind.</text>

  <!-- ═══════════ RIGHT: WITH THE VISUAL LAYER ═══════════ -->
  <rect x="350" y="72" width="300" height="440" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="500" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1c1917" letter-spacing="0.04em">WITH THE VISUAL LAYER</text>
  <text x="500" y="112" text-anchor="middle" font-size="9" fill="#a8a29e">What development becomes.</text>

  <!-- Step 1: Idea -->
  <rect x="380" y="130" width="240" height="36" rx="4" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="500" y="152" text-anchor="middle" font-size="10" fill="#166534">You have an idea in your head. You can see it.</text>

  <!-- Arrow -->
  <line x1="500" y1="170" x2="500" y2="188" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="494,184 500,194 506,184" fill="#d6d3d1"/>

  <!-- Step 2: Describe -->
  <rect x="380" y="196" width="240" height="36" rx="4" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="500" y="218" text-anchor="middle" font-size="10" fill="#44403c">Describe it in plain language.</text>

  <!-- Arrow -->
  <line x1="500" y1="236" x2="500" y2="254" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="494,250 500,260 506,250" fill="#d6d3d1"/>

  <!-- Step 3: See it forming -->
  <rect x="380" y="262" width="240" height="44" rx="4" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
  <text x="500" y="280" text-anchor="middle" font-size="10" font-weight="500" fill="#1e40af">See it forming.</text>
  <text x="500" y="296" text-anchor="middle" font-size="9" fill="#1e40af">The artifact appears as the AI builds it.</text>

  <!-- Arrow -->
  <line x1="500" y1="310" x2="500" y2="328" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="494,324 500,334 506,324" fill="#d6d3d1"/>

  <!-- Step 4: Feel -->
  <rect x="380" y="336" width="240" height="44" rx="4" fill="#fce7f3" stroke="#fbcfe8" stroke-width="1"/>
  <text x="500" y="354" text-anchor="middle" font-size="10" font-weight="500" fill="#9d174d">Feel whether it is right.</text>
  <text x="500" y="370" text-anchor="middle" font-size="9" fill="#9d174d">Your eyes do the work. 13 milliseconds.</text>

  <!-- Arrow -->
  <line x1="500" y1="384" x2="500" y2="402" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="494,398 500,408 506,398" fill="#d6d3d1"/>

  <!-- Step 5: Steer -->
  <rect x="380" y="410" width="240" height="36" rx="4" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="500" y="432" text-anchor="middle" font-size="10" fill="#166534">Steer it with a sentence. Ship when it matches.</text>

  <!-- Loop arrow -->
  <path d="M 620 428 L 636 428 L 636 280 L 620 280" stroke="#22c55e" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="622,274 612,280 622,286" fill="#22c55e"/>
  <text x="646" y="356" font-size="8" fill="#22c55e" transform="rotate(90, 646, 356)">Each cycle: minutes.</text>

  <!-- Right caption -->
  <text x="500" y="460" text-anchor="middle" font-size="9" fill="#a8a29e">The idea stays intact because you see it at every step.</text>
  <text x="500" y="474" text-anchor="middle" font-size="9" fill="#a8a29e">What you imagine and what exists converge.</text>
  <text x="500" y="494" text-anchor="middle" font-size="10" font-weight="500" fill="#1c1917">Building with your eyes open.</text>

  <!-- Bottom line -->
  <line x1="60" y1="530" x2="620" y2="530" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="554" text-anchor="middle" font-size="10" fill="#44403c">The gap between what you imagine and what you build was never intelligence.</text>
  <text x="340" y="570" text-anchor="middle" font-size="10" font-weight="500" fill="#1c1917">It was seeing.</text>
</svg>

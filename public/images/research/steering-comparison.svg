<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafaf9"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="900" height="620" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <text x="450" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1c1917" letter-spacing="0.08em">THE VISUAL WORKFLOW</text>
  <text x="450" y="52" text-anchor="middle" font-size="10" fill="#78716c">What Hive changes: not the models themselves, but the way you see, steer, and stack them top to bottom.</text>

  <rect x="28" y="78" width="250" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="48" y="106" font-size="12" font-weight="700" fill="#1c1917">1. Your machine</text>
  <text x="48" y="124" font-size="9.5" fill="#78716c">Up to eight local terminals, stacked vertically.</text>

  <rect x="48" y="146" width="210" height="168" rx="12" fill="#111827"/>
  <rect x="60" y="160" width="186" height="16" rx="6" fill="#1f2937"/>
  <circle cx="70" cy="168" r="2.5" fill="#22c55e"/>
  <text x="80" y="172" font-size="7.2" font-weight="700" fill="#d6d3d1">Q1  auth refactor</text>
  <rect x="60" y="184" width="186" height="16" rx="6" fill="#1f2937"/>
  <circle cx="70" cy="192" r="2.5" fill="#3b82f6"/>
  <text x="80" y="196" font-size="7.2" font-weight="700" fill="#d6d3d1">Q2  dashboard bug</text>
  <rect x="60" y="208" width="186" height="16" rx="6" fill="#1f2937"/>
  <circle cx="70" cy="216" r="2.5" fill="#f97316"/>
  <text x="80" y="220" font-size="7.2" font-weight="700" fill="#d6d3d1">Q3  broad automation</text>
  <rect x="60" y="232" width="186" height="16" rx="6" fill="#1f2937"/>
  <circle cx="70" cy="240" r="2.5" fill="#22c55e"/>
  <text x="80" y="244" font-size="7.2" font-weight="700" fill="#d6d3d1">Q4  system audit</text>
  <rect x="60" y="256" width="186" height="16" rx="6" fill="#1f2937"/>
  <circle cx="70" cy="264" r="2.5" fill="#22c55e"/>
  <text x="80" y="268" font-size="7.2" font-weight="700" fill="#d6d3d1">Q5  test runner</text>
  <rect x="60" y="280" width="186" height="16" rx="6" fill="#1f2937"/>
  <text x="153" y="291" text-anchor="middle" font-size="6.8" fill="#9ca3af">...Q6 through Q8 continue below</text>

  <text x="153" y="338" text-anchor="middle" font-size="9.5" font-weight="600" fill="#57534e">The vertical order on screen matters.</text>
  <text x="153" y="353" text-anchor="middle" font-size="8.5" fill="#a8a29e">Top terminal stays the top row. New agents stack underneath.</text>

  <line x1="292" y1="228" x2="322" y2="228" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="318,223 328,228 318,233" fill="#d6d3d1"/>
  <text x="309" y="214" text-anchor="middle" font-size="8.5" fill="#78716c">mirrored 1:1</text>

  <rect x="336" y="78" width="250" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="356" y="106" font-size="12" font-weight="700" fill="#1c1917">2. Hosted dashboard</text>
  <text x="356" y="124" font-size="9.5" fill="#78716c">The same vertical stack, visible from your phone.</text>

  <rect x="408" y="146" width="106" height="186" rx="22" fill="#18181b" stroke="#44403c" stroke-width="1"/>
  <rect x="445" y="154" width="32" height="6" rx="3" fill="#44403c"/>
  <rect x="420" y="170" width="82" height="18" rx="9" fill="#111827"/>
  <text x="461" y="183" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fafaf9">HIVE</text>
  <rect x="420" y="196" width="82" height="12" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="461" y="204" text-anchor="middle" font-size="6" font-weight="700" fill="#166534">Q1  working</text>
  <rect x="420" y="212" width="82" height="12" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="461" y="220" text-anchor="middle" font-size="6" font-weight="700" fill="#166534">Q2  working</text>
  <rect x="420" y="228" width="82" height="12" rx="6" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="461" y="236" text-anchor="middle" font-size="6" font-weight="700" fill="#92400e">Q3  needs you</text>
  <rect x="420" y="244" width="82" height="12" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="461" y="252" text-anchor="middle" font-size="6" font-weight="700" fill="#991b1b">Q4  done</text>
  <rect x="420" y="260" width="82" height="12" rx="6" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="461" y="268" text-anchor="middle" font-size="6" font-weight="700" fill="#57534e">Q5  testing</text>
  <rect x="420" y="276" width="82" height="12" rx="6" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="461" y="284" text-anchor="middle" font-size="6" font-weight="700" fill="#57534e">Q6  syncing</text>
  <rect x="420" y="292" width="82" height="12" rx="6" fill="none" stroke="#78716c" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="461" y="300" text-anchor="middle" font-size="6" font-weight="700" fill="#a8a29e">Q7-Q8 below</text>

  <text x="461" y="354" text-anchor="middle" font-size="9.5" font-weight="600" fill="#57534e">You do not read eight terminals anymore.</text>
  <text x="461" y="369" text-anchor="middle" font-size="8.5" fill="#a8a29e">You glance at one stack and know what matters.</text>

  <line x1="600" y1="228" x2="630" y2="228" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="626,223 636,228 626,233" fill="#d6d3d1"/>
  <text x="615" y="214" text-anchor="middle" font-size="8.5" fill="#78716c">human steers</text>

  <rect x="644" y="78" width="228" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="664" y="106" font-size="12" font-weight="700" fill="#1c1917">3. Steering loop</text>
  <text x="664" y="124" font-size="9.5" fill="#78716c">What the visual layer actually unlocks.</text>

  <rect x="664" y="148" width="188" height="46" rx="12" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="682" cy="171" r="6" fill="#eab308"/>
  <text x="698" y="167" font-size="9.5" font-weight="600" fill="#1c1917">Notice a yellow row.</text>
  <text x="698" y="181" font-size="8.5" fill="#78716c">The longer stack still reads at a glance.</text>

  <rect x="664" y="206" width="188" height="46" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="682" cy="229" r="6" fill="#3b82f6"/>
  <text x="698" y="225" font-size="9.5" font-weight="600" fill="#1c1917">Tap and send direction.</text>
  <text x="698" y="239" font-size="8.5" fill="#78716c">"Summarize what Q1 and Q2 found."</text>

  <rect x="664" y="264" width="188" height="46" rx="12" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="682" cy="287" r="6" fill="#22c55e"/>
  <text x="698" y="283" font-size="9.5" font-weight="600" fill="#1c1917">Route a handoff.</text>
  <text x="698" y="297" font-size="8.5" fill="#78716c">The order stays stable from top to bottom.</text>

  <rect x="664" y="322" width="188" height="46" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <circle cx="682" cy="345" r="6" fill="#a855f7"/>
  <text x="698" y="341" font-size="9.5" font-weight="600" fill="#1c1917">Audit across models.</text>
  <text x="698" y="355" font-size="8.5" fill="#78716c">One model catches drift another one missed.</text>

  <line x1="40" y1="406" x2="860" y2="406" stroke="#e7e5e4" stroke-width="1"/>
  <text x="450" y="426" text-anchor="middle" font-size="10" fill="#a8a29e">What the daemon is doing underneath.</text>

  <rect x="40" y="444" width="820" height="92" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="64" y="468" font-size="11" font-weight="700" fill="#1c1917">The coordination layer</text>
  <text x="64" y="486" font-size="9" fill="#a8a29e">This is why the visual layer works in practice, not just in theory.</text>

  <text x="64" y="512" font-size="8.8" fill="#44403c">Vertical stack mapping</text>
  <text x="208" y="512" font-size="8.8" fill="#44403c">Status detection</text>
  <text x="310" y="512" font-size="8.8" fill="#44403c">Messaging</text>
  <text x="384" y="512" font-size="8.8" fill="#44403c">Workflow handoffs</text>
  <text x="508" y="512" font-size="8.8" fill="#44403c">Cross-runtime use</text>
  <text x="626" y="512" font-size="8.8" fill="#44403c">Autopilot + watchdog</text>
  <text x="762" y="512" font-size="8.8" fill="#44403c">Learned context</text>

  <text x="64" y="528" font-size="8" fill="#a8a29e">Top strip on screen stays top row on the phone</text>
  <text x="208" y="528" font-size="8" fill="#a8a29e">Hook, JSONL, CPU, and PTY signals</text>
  <text x="310" y="528" font-size="8" fill="#a8a29e">Direct messages from any device</text>
  <text x="384" y="528" font-size="8" fill="#a8a29e">Focused summaries, not a shared mind</text>
  <text x="508" y="528" font-size="8" fill="#a8a29e">Claude, Codex, OpenClaw, and more in one stack</text>
  <text x="626" y="528" font-size="8" fill="#a8a29e">Routine interruptions handled automatically</text>
  <text x="762" y="528" font-size="8" fill="#a8a29e">Project learnings compound over time</text>

  <line x1="40" y1="560" x2="860" y2="560" stroke="#e7e5e4" stroke-width="1"/>
  <text x="450" y="584" text-anchor="middle" font-size="10" fill="#44403c">Hive is not another model or a replacement for the tools underneath.</text>
  <text x="450" y="600" text-anchor="middle" font-size="10" font-weight="600" fill="#1c1917">It is the management layer that lets you finally see enough to direct the whole stack.</text>
</svg>

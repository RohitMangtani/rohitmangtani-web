<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafaf9"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="900" height="620" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <text x="450" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1c1917" letter-spacing="0.08em">THE VISUAL WORKFLOW</text>
  <text x="450" y="52" text-anchor="middle" font-size="10" fill="#78716c">What Hive changes: not the models themselves, but the way you see, steer, and scale them from four to eight.</text>

  <rect x="28" y="78" width="250" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="48" y="106" font-size="12" font-weight="700" fill="#1c1917">1. Your machine</text>
  <text x="48" y="124" font-size="9.5" fill="#78716c">Up to eight local terminals doing real work.</text>

  <rect x="48" y="148" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="54" y="156" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="60" cy="161" r="2" fill="#22c55e"/>
  <text x="65" y="181" font-size="7" font-weight="700" fill="#d6d3d1">Q1</text>
  <text x="54" y="194" font-size="5.8" fill="#9ca3af">auth</text>

  <rect x="102" y="148" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="108" y="156" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="114" cy="161" r="2" fill="#3b82f6"/>
  <text x="119" y="181" font-size="7" font-weight="700" fill="#d6d3d1">Q2</text>
  <text x="108" y="194" font-size="5.8" fill="#9ca3af">copy</text>

  <rect x="156" y="148" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="162" y="156" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="168" cy="161" r="2" fill="#f97316"/>
  <text x="173" y="181" font-size="7" font-weight="700" fill="#d6d3d1">Q3</text>
  <text x="162" y="194" font-size="5.8" fill="#9ca3af">ops</text>

  <rect x="210" y="148" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="216" y="156" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="222" cy="161" r="2" fill="#22c55e"/>
  <text x="227" y="181" font-size="7" font-weight="700" fill="#d6d3d1">Q4</text>
  <text x="216" y="194" font-size="5.8" fill="#9ca3af">audit</text>

  <rect x="48" y="224" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="54" y="232" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="60" cy="237" r="2" fill="#22c55e"/>
  <text x="65" y="257" font-size="7" font-weight="700" fill="#d6d3d1">Q5</text>
  <text x="54" y="270" font-size="5.8" fill="#9ca3af">tests</text>

  <rect x="102" y="224" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="108" y="232" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="114" cy="237" r="2" fill="#3b82f6"/>
  <text x="119" y="257" font-size="7" font-weight="700" fill="#d6d3d1">Q6</text>
  <text x="108" y="270" font-size="5.8" fill="#9ca3af">ws</text>

  <rect x="156" y="224" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="162" y="232" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="168" cy="237" r="2" fill="#f97316"/>
  <text x="173" y="257" font-size="7" font-weight="700" fill="#d6d3d1">Q7</text>
  <text x="162" y="270" font-size="5.8" fill="#9ca3af">infra</text>

  <rect x="210" y="224" width="44" height="64" rx="10" fill="#111827"/>
  <rect x="216" y="232" width="30" height="10" rx="5" fill="#1f2937"/>
  <circle cx="222" cy="237" r="2" fill="#22c55e"/>
  <text x="227" y="257" font-size="7" font-weight="700" fill="#d6d3d1">Q8</text>
  <text x="216" y="270" font-size="5.8" fill="#9ca3af">video</text>

  <text x="153" y="330" text-anchor="middle" font-size="9.5" font-weight="600" fill="#57534e">The layout on screen matters.</text>
  <text x="153" y="345" text-anchor="middle" font-size="8.5" fill="#a8a29e">Top-left terminal stays top-left tile as the grid widens.</text>

  <line x1="292" y1="228" x2="322" y2="228" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="318,223 328,228 318,233" fill="#d6d3d1"/>
  <text x="309" y="214" text-anchor="middle" font-size="8.5" fill="#78716c">mirrored 1:1</text>

  <rect x="336" y="78" width="250" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="356" y="106" font-size="12" font-weight="700" fill="#1c1917">2. Hosted dashboard</text>
  <text x="356" y="124" font-size="9.5" fill="#78716c">The same adaptive grid, visible from your phone.</text>

  <rect x="386" y="146" width="150" height="18" rx="9" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="461" y="158" text-anchor="middle" font-size="8" font-weight="600" fill="#57534e">2x2 to 3x2 to 4x2</text>

  <rect x="402" y="174" width="118" height="156" rx="22" fill="#18181b" stroke="#44403c" stroke-width="1"/>
  <rect x="445" y="182" width="32" height="6" rx="3" fill="#44403c"/>
  <rect x="416" y="198" width="90" height="18" rx="9" fill="#111827"/>
  <text x="461" y="211" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fafaf9">HIVE</text>
  <rect x="416" y="224" width="20" height="32" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="426" y="245" text-anchor="middle" font-size="6.2" font-weight="700" fill="#166534">Q1</text>
  <rect x="440" y="224" width="20" height="32" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="245" text-anchor="middle" font-size="6.2" font-weight="700" fill="#166534">Q2</text>
  <rect x="464" y="224" width="20" height="32" rx="8" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="474" y="245" text-anchor="middle" font-size="6.2" font-weight="700" fill="#92400e">Q3</text>
  <rect x="488" y="224" width="18" height="32" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="497" y="245" text-anchor="middle" font-size="5.9" font-weight="700" fill="#991b1b">Q4</text>
  <rect x="416" y="262" width="20" height="32" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="426" y="283" text-anchor="middle" font-size="6.2" font-weight="700" fill="#166534">Q5</text>
  <rect x="440" y="262" width="20" height="32" rx="8" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1"/>
  <text x="450" y="283" text-anchor="middle" font-size="6.2" font-weight="700" fill="#57534e">Q6</text>
  <rect x="464" y="262" width="20" height="32" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="474" y="283" text-anchor="middle" font-size="6.2" font-weight="700" fill="#166534">Q7</text>
  <rect x="488" y="262" width="18" height="32" rx="8" fill="none" stroke="#78716c" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="497" y="283" text-anchor="middle" font-size="5.9" font-weight="700" fill="#a8a29e">Q8</text>
  <rect x="422" y="302" width="78" height="10" rx="5" fill="#111827"/>
  <text x="461" y="310" text-anchor="middle" font-size="6.3" fill="#a8a29e">same map, more agents</text>

  <text x="461" y="354" text-anchor="middle" font-size="9.5" font-weight="600" fill="#57534e">You do not read eight terminals anymore.</text>
  <text x="461" y="369" text-anchor="middle" font-size="8.5" fill="#a8a29e">You glance at one layout and know what matters.</text>

  <line x1="600" y1="228" x2="630" y2="228" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="626,223 636,228 626,233" fill="#d6d3d1"/>
  <text x="615" y="214" text-anchor="middle" font-size="8.5" fill="#78716c">human steers</text>

  <rect x="644" y="78" width="228" height="300" rx="14" fill="url(#panelFill)" stroke="#e7e5e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="664" y="106" font-size="12" font-weight="700" fill="#1c1917">3. Steering loop</text>
  <text x="664" y="124" font-size="9.5" fill="#78716c">What the visual layer actually unlocks.</text>

  <rect x="664" y="148" width="188" height="46" rx="12" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="682" cy="171" r="6" fill="#eab308"/>
  <text x="698" y="167" font-size="9.5" font-weight="600" fill="#1c1917">Notice a yellow tile.</text>
  <text x="698" y="181" font-size="8.5" fill="#78716c">Even the wider grid still reads at a glance.</text>

  <rect x="664" y="206" width="188" height="46" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="682" cy="229" r="6" fill="#3b82f6"/>
  <text x="698" y="225" font-size="9.5" font-weight="600" fill="#1c1917">Tap and send direction.</text>
  <text x="698" y="239" font-size="8.5" fill="#78716c">"Summarize what Q1 and Q2 found."</text>

  <rect x="664" y="264" width="188" height="46" rx="12" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="682" cy="287" r="6" fill="#22c55e"/>
  <text x="698" y="283" font-size="9.5" font-weight="600" fill="#1c1917">Route a handoff.</text>
  <text x="698" y="297" font-size="8.5" fill="#78716c">The positions stay stable while the grid widens.</text>

  <rect x="664" y="322" width="188" height="46" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <circle cx="682" cy="345" r="6" fill="#a855f7"/>
  <text x="698" y="341" font-size="9.5" font-weight="600" fill="#1c1917">Audit across models.</text>
  <text x="698" y="355" font-size="8.5" fill="#78716c">One model catches drift another one missed.</text>

  <line x1="40" y1="406" x2="860" y2="406" stroke="#e7e5e4" stroke-width="1"/>
  <text x="450" y="426" text-anchor="middle" font-size="10" fill="#a8a29e">What the daemon is doing underneath.</text>

  <rect x="40" y="444" width="820" height="92" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1"/>
  <text x="64" y="468" font-size="11" font-weight="700" fill="#1c1917">The coordination layer</text>
  <text x="64" y="486" font-size="9" fill="#a8a29e">This is why the visual layer works in practice, not just in theory.</text>

  <text x="64" y="512" font-size="8.8" fill="#44403c">Adaptive grid mapping</text>
  <text x="206" y="512" font-size="8.8" fill="#44403c">Status detection</text>
  <text x="308" y="512" font-size="8.8" fill="#44403c">Messaging</text>
  <text x="382" y="512" font-size="8.8" fill="#44403c">Workflow handoffs</text>
  <text x="506" y="512" font-size="8.8" fill="#44403c">Cross-runtime use</text>
  <text x="624" y="512" font-size="8.8" fill="#44403c">Autopilot + watchdog</text>
  <text x="760" y="512" font-size="8.8" fill="#44403c">Learned context</text>

  <text x="64" y="528" font-size="8" fill="#a8a29e">2x2, 3x2, and 4x2 stay aligned to your screen</text>
  <text x="206" y="528" font-size="8" fill="#a8a29e">Hook, JSONL, CPU, and PTY signals</text>
  <text x="308" y="528" font-size="8" fill="#a8a29e">Direct messages from any device</text>
  <text x="382" y="528" font-size="8" fill="#a8a29e">Focused summaries, not a shared mind</text>
  <text x="506" y="528" font-size="8" fill="#a8a29e">Claude, Codex, OpenClaw, and more in one grid</text>
  <text x="624" y="528" font-size="8" fill="#a8a29e">Routine interruptions handled automatically</text>
  <text x="760" y="528" font-size="8" fill="#a8a29e">Project learnings compound over time</text>

  <line x1="40" y1="560" x2="860" y2="560" stroke="#e7e5e4" stroke-width="1"/>
  <text x="450" y="584" text-anchor="middle" font-size="10" fill="#44403c">Hive is not another model or a replacement for the tools underneath.</text>
  <text x="450" y="600" text-anchor="middle" font-size="10" font-weight="600" fill="#1c1917">It is the management layer that lets you finally see enough to direct the whole grid.</text>
</svg>

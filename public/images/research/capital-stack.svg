<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="480" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">THE CAPITAL RECYCLING LOOP</text>

  <!-- Step 1: Create (top) -->
  <rect x="80" y="60" width="220" height="68" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="100" y="84" font-size="12" font-weight="600" fill="#1c1917">1. Create</text>
  <text x="100" y="100" font-size="10" fill="#44403c">Sensor uses AI to build product,</text>
  <text x="100" y="114" font-size="10" fill="#44403c">content, tool. Afternoon, not months.</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="94" x2="370" y2="94" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="366,88 376,94 366,100" fill="#d6d3d1"/>

  <!-- Step 2: Monetize -->
  <rect x="380" y="60" width="220" height="68" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="400" y="84" font-size="12" font-weight="600" fill="#1c1917">2. Monetize</text>
  <text x="400" y="100" font-size="10" fill="#44403c">Revenue through subscriptions,</text>
  <text x="400" y="114" font-size="10" fill="#44403c">sales, platforms. Near-zero friction.</text>

  <!-- Arrow 2 (down) -->
  <line x1="490" y1="128" x2="490" y2="170" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="484,166 490,176 496,166" fill="#d6d3d1"/>

  <!-- Step 3: Revenue hits fiat -->
  <rect x="380" y="178" width="220" height="68" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="400" y="202" font-size="12" font-weight="600" fill="#1c1917">3. Fiat Erosion</text>
  <text x="400" y="218" font-size="10" fill="#44403c">Cash loses ~85% over decades.</text>
  <text x="400" y="232" font-size="10" fill="#44403c">Holding = losing. Must move capital.</text>

  <!-- Arrow 3 (down) -->
  <line x1="490" y1="246" x2="490" y2="288" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="484,284 490,294 496,284" fill="#d6d3d1"/>

  <!-- Step 4: Invest in belief assets -->
  <rect x="380" y="296" width="220" height="68" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="400" y="320" font-size="12" font-weight="600" fill="#1c1917">4. Belief Assets</text>
  <text x="400" y="336" font-size="10" fill="#44403c">Bitcoin, community tokens, creator</text>
  <text x="400" y="350" font-size="10" fill="#44403c">platforms. Conviction prices the asset.</text>

  <!-- Arrow 4 (left) -->
  <line x1="380" y1="330" x2="300" y2="330" stroke="#d6d3d1" stroke-width="1.5"/>
  <polygon points="304,324 294,330 304,336" fill="#d6d3d1"/>

  <!-- Step 5: Appreciation -->
  <rect x="80" y="296" width="220" height="68" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="100" y="320" font-size="12" font-weight="600" fill="#1c1917">5. Appreciation</text>
  <text x="100" y="336" font-size="10" fill="#44403c">Reflexivity loop: belief drives price,</text>
  <text x="100" y="350" font-size="10" fill="#44403c">price validates belief. Cycle compounds.</text>

  <!-- Arrow 5 (up, back to Create) -->
  <path d="M 80 320 Q 40 320 40 200 Q 40 80 80 80" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-dasharray="6,4"/>
  <polygon points="76,74 86,80 76,86" fill="#22c55e"/>

  <!-- Recycle label -->
  <text x="32" y="200" text-anchor="middle" font-size="9" fill="#22c55e" transform="rotate(-90, 32, 200)">FUNDS NEXT CREATION</text>

  <!-- Cycle time comparison -->
  <rect x="120" y="400" width="440" height="52" rx="6" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1c1917">Cycle Time</text>
  <text x="220" y="440" text-anchor="middle" font-size="10" fill="#a8a29e">Traditional: months to years</text>
  <text x="460" y="440" text-anchor="middle" font-size="10" font-weight="500" fill="#22c55e">Sensor layer: days</text>
  <line x1="340" y1="428" x2="340" y2="446" stroke="#e7e5e4" stroke-width="1"/>
</svg>

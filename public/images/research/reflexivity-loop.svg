<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="400" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">THE REFLEXIVITY LOOP</text>
  <text x="340" y="54" text-anchor="middle" font-size="11" fill="#a8a29e">Belief prices assets. Assets validate belief.</text>

  <!-- Center circle -->
  <circle cx="340" cy="210" r="40" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#1c1917">REFLEXIVE</text>
  <text x="340" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#1c1917">CYCLE</text>

  <!-- Node 1: Conviction (top) -->
  <rect x="260" y="75" width="160" height="50" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">Conviction</text>
  <text x="340" y="114" text-anchor="middle" font-size="9" fill="#a8a29e">"I believe this holds value"</text>

  <!-- Node 2: Capital Flow (right) -->
  <rect x="480" y="185" width="160" height="50" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="560" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">Capital Flow</text>
  <text x="560" y="224" text-anchor="middle" font-size="9" fill="#a8a29e">Money follows belief</text>

  <!-- Node 3: Price Movement (bottom) -->
  <rect x="260" y="295" width="160" height="50" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="340" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">Price Movement</text>
  <text x="340" y="334" text-anchor="middle" font-size="9" fill="#a8a29e">Asset appreciates</text>

  <!-- Node 4: Narrative (left) -->
  <rect x="40" y="185" width="160" height="50" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="120" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">Narrative</text>
  <text x="120" y="224" text-anchor="middle" font-size="9" fill="#a8a29e">"See, it worked"</text>

  <!-- Arrow: Conviction -> Capital Flow -->
  <path d="M 420 115 Q 470 140 480 190" stroke="#44403c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow: Capital Flow -> Price Movement -->
  <path d="M 490 235 Q 470 280 420 305" stroke="#44403c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow: Price Movement -> Narrative -->
  <path d="M 260 310 Q 210 290 200 240" stroke="#44403c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow: Narrative -> Conviction -->
  <path d="M 190 185 Q 210 140 260 115" stroke="#44403c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#44403c"/>
    </marker>
  </defs>

  <!-- Example label -->
  <text x="340" y="378" text-anchor="middle" font-size="10" fill="#a8a29e">Bitcoin: belief → buying → price rise → "Bitcoin stores value" → more belief</text>
</svg>

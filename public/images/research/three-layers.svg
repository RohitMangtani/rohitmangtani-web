<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="520" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1917" letter-spacing="0.08em">THE THREE LAYERS</text>

  <!-- Layer 1: The Black Box -->
  <rect x="140" y="70" width="400" height="110" rx="6" fill="#1c1917"/>
  <rect x="160" y="86" width="360" height="78" rx="4" fill="#0f0f0f"/>
  <!-- Terminal prompt -->
  <text x="176" y="108" font-size="11" font-family="'SF Mono', 'Fira Code', monospace" fill="#6ee7b7">$</text>
  <text x="192" y="108" font-size="11" font-family="'SF Mono', 'Fira Code', monospace" fill="#a8a29e">build a research article with 3 diagrams, source</text>
  <text x="192" y="124" font-size="11" font-family="'SF Mono', 'Fira Code', monospace" fill="#a8a29e">every reference, write in my voice, push to prod</text>
  <text x="176" y="148" font-size="11" font-family="'SF Mono', 'Fira Code', monospace" fill="#44403c">spawning 4 agents...</text>
  <text x="340" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">THE BLACK BOX</text>
  <text x="340" y="216" text-anchor="middle" font-size="11" fill="#44403c">Intent in. Output out. The terminal is the new IDE.</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="228" x2="340" y2="252" stroke="#e7e5e4" stroke-width="1.5"/>
  <polygon points="334,248 340,258 346,248" fill="#e7e5e4"/>

  <!-- Layer 2: The Map -->
  <rect x="140" y="260" width="400" height="90" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <!-- Map nodes -->
  <circle cx="210" cy="300" r="16" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="210" y="304" text-anchor="middle" font-size="9" fill="#44403c">API</text>
  <circle cx="300" cy="285" r="16" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="300" y="289" text-anchor="middle" font-size="9" fill="#44403c">UI</text>
  <circle cx="390" cy="300" r="16" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="390" y="304" text-anchor="middle" font-size="9" fill="#44403c">Data</text>
  <circle cx="470" cy="290" r="16" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1"/>
  <text x="470" y="294" text-anchor="middle" font-size="9" fill="#44403c">Auth</text>
  <!-- Connection lines -->
  <line x1="226" y1="296" x2="284" y2="289" stroke="#d6d3d1" stroke-width="1"/>
  <line x1="316" y1="289" x2="374" y2="296" stroke="#d6d3d1" stroke-width="1"/>
  <line x1="406" y1="296" x2="454" y2="293" stroke="#d6d3d1" stroke-width="1"/>
  <line x1="226" y1="308" x2="374" y2="308" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="340" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">THE MAP</text>
  <text x="340" y="386" text-anchor="middle" font-size="11" fill="#44403c">What is the project doing. From the creator's perspective, not the code's.</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="398" x2="340" y2="418" stroke="#e7e5e4" stroke-width="1.5"/>
  <polygon points="334,414 340,424 346,414" fill="#e7e5e4"/>

  <!-- Layer 3: The Manager -->
  <rect x="140" y="426" width="400" height="52" rx="6" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <!-- Agent status dots -->
  <circle cx="200" cy="452" r="5" fill="#22c55e"/>
  <text x="212" y="456" font-size="10" fill="#44403c">Agent 1</text>
  <circle cx="300" cy="452" r="5" fill="#22c55e"/>
  <text x="312" y="456" font-size="10" fill="#44403c">Agent 2</text>
  <circle cx="400" cy="452" r="5" fill="#ef4444"/>
  <text x="412" y="456" font-size="10" fill="#44403c">Agent 3</text>
  <circle cx="490" cy="452" r="5" fill="#22c55e"/>
  <text x="502" y="456" font-size="10" fill="#44403c">Agent 4</text>

  <text x="340" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">THE MANAGER</text>
  <text x="340" y="514" text-anchor="middle" font-size="11" fill="#44403c">Find My iPhone for agents. Green means driving. Red means lost.</text>
</svg>
